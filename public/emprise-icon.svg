<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="dish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#79ddd6"/>
      <stop offset="100%" stop-color="#3ba8a0"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#58d1c9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#58d1c9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="2" fill="#c9d1d9" opacity="0.5"/>
  <circle cx="420" cy="90" r="1.5" fill="#c9d1d9" opacity="0.4"/>
  <circle cx="150" cy="120" r="1" fill="#c9d1d9" opacity="0.3"/>
  <circle cx="380" cy="50" r="2" fill="#c9d1d9" opacity="0.6"/>
  <circle cx="300" cy="80" r="1.5" fill="#c9d1d9" opacity="0.3"/>
  <circle cx="440" cy="160" r="1" fill="#c9d1d9" opacity="0.4"/>
  <circle cx="70" cy="180" r="1.5" fill="#c9d1d9" opacity="0.3"/>
  <!-- Signal beam (glow going up from dish) -->
  <path d="M256 180 L220 60 L292 60 Z" fill="url(#glow)"/>
  <!-- Dish -->
  <path d="M130 260 Q256 160 382 260" stroke="url(#dish)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <!-- Feed arm -->
  <line x1="256" y1="180" x2="256" y2="260" stroke="#58d1c9" stroke-width="6"/>
  <!-- Focus point -->
  <circle cx="256" cy="175" r="8" fill="#58d1c9"/>
  <circle cx="256" cy="175" r="14" fill="none" stroke="#58d1c9" stroke-width="2" opacity="0.4"/>
  <!-- Support post -->
  <line x1="256" y1="260" x2="256" y2="380" stroke="#58d1c9" stroke-width="8" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="196" y="370" width="120" height="20" rx="6" fill="#3ba8a0"/>
  <!-- Text -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="42" font-weight="700" fill="#58d1c9">emprise</text>
  <text x="256" y="470" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16" fill="#8b949e">a bold undertaking</text>
</svg>
